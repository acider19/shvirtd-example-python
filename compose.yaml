include:
    - proxy.yaml

services:
    web:
        depends_on:
            - db
              #image: cr.yandex/crpj7bgsnkev2f05tsv9/python_server:latest
        build:
          context: .
          dockerfile: Dockerfile.python
        restart: always
        networks:
            backend:
                ipv4_address: 172.20.0.5
        # ports:
        #     - "127.0.0.1:8090:5000"

        environment:
            DB_HOST: db
            DB_USER: ${MYSQL_USER}
            DB_PASSWORD: ${MYSQL_PASSWORD}
            DB_NAME: ${MYSQL_DATABASE}

    db:
        image: mysql:8
        restart: always
        networks:
            backend:
                ipv4_address: 172.20.0.10
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
        command: --mysql-native-password=ON

networks:
    backend:
        driver: bridge
        ipam:
            config:
                - subnet: 172.20.0.0/24
